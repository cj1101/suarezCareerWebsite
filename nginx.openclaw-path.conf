# Nginx integration for charlie.suarezhouse.net
# Goal: keep existing site at / unchanged, mount OpenClaw at /openclaw/*
#
# Upstreams on EC2 host:
# - Dashboard (Next.js): 127.0.0.1:3000
# - Gateway:             127.0.0.1:18789
# - Router:              127.0.0.1:8787
#
# NOTE:
# - Copy only the location blocks into your existing server block if you already
#   have one for charlie.suarezhouse.net.
# - Place more specific locations before generic /openclaw/ where applicable.

server {
    listen 443 ssl http2;
    server_name charlie.suarezhouse.net;

    # ssl_certificate /etc/letsencrypt/live/charlie.suarezhouse.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/charlie.suarezhouse.net/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Existing website root at / remains unchanged.
    # Keep your current root/try_files/proxy config here.
    location / {
        root /var/www/charlie.suarezhouse.net;
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # OpenClaw protection: ONLY /openclaw/* requires auth.
    # -------------------------------------------------------------------------
    location ^~ /openclaw/ {
        auth_basic "OpenClaw Mission Control";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;

        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /openclaw;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # SSE stream: /openclaw/logs/router -> router service
    # Rewrites to backend /logs/router while preserving auth scope.
    location = /openclaw/logs/router {
        auth_basic "OpenClaw Mission Control";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;

        rewrite ^/openclaw/logs/router$ /logs/router break;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # SSE stream: /openclaw/logs/gateway -> gateway service
    location = /openclaw/logs/gateway {
        auth_basic "OpenClaw Mission Control";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;

        rewrite ^/openclaw/logs/gateway$ /logs/gateway break;
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # API routing namespace:
    # - /openclaw/api/gateway/* -> 127.0.0.1:18789/*
    # - /openclaw/api/router/*  -> 127.0.0.1:8787/*
    location ^~ /openclaw/api/gateway/ {
        auth_basic "OpenClaw Mission Control";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;

        rewrite ^/openclaw/api/gateway/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /openclaw/api/router/ {
        auth_basic "OpenClaw Mission Control";
        auth_basic_user_file /etc/nginx/.htpasswd-openclaw;

        rewrite ^/openclaw/api/router/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
